<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 여행 플래너</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #080c14;
      color: #e8eaf0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(79,124,255,0.1) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 80% 80%, rgba(168,85,247,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .inner { position: relative; z-index: 1; width: 100%; max-width: 900px; }
    .badge {
      display: inline-block; padding: 5px 14px; border-radius: 999px;
      background: rgba(79,124,255,0.1); border: 1px solid rgba(79,124,255,0.25);
      font-size: 11px; font-weight: 700; color: #4f7cff;
      margin-bottom: 20px;
    }
    h1 { font-size: 38px; font-weight: 800; letter-spacing: -1.5px; line-height: 1.2; margin-bottom: 12px; }
    h1 span { background: linear-gradient(135deg, #4f7cff, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .sub { font-size: 15px; color: #8892a4; margin-bottom: 48px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 20px; }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 28px 24px;
      text-decoration: none; color: inherit;
      display: flex; flex-direction: column; gap: 14px;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      position: relative; overflow: hidden;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
    .card.soon { opacity: 0.5; cursor: default; pointer-events: none; }
    .card-1:hover { border-color: rgba(251,191,36,0.5); }
    .card-2:hover { border-color: rgba(99,179,237,0.5); }
    .card-3:hover { border-color: rgba(79,124,255,0.5); }
    .card-4:hover { border-color: rgba(0,201,167,0.5); }
    .soon-tag {
      position: absolute; top: 16px; right: 16px;
      padding: 3px 9px; border-radius: 999px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      font-size: 9px; font-weight: 700; color: #4a5568; letter-spacing: 0.5px;
    }
    .card-num { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.5; }
    .card-icon { font-size: 36px; }
    .card-title { font-size: 17px; font-weight: 800; letter-spacing: -0.5px; }
    .card-desc { font-size: 12px; color: #8892a4; line-height: 1.6; flex: 1; }
    .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      padding: 3px 9px; border-radius: 999px;
      font-size: 10px; font-weight: 600;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #8892a4;
    }
    .card-arrow { font-size: 18px; opacity: 0.4; align-self: flex-end; transition: opacity 0.2s, transform 0.2s; }
    .card:hover .card-arrow { opacity: 1; transform: translateX(4px); }
    footer { margin-top: 48px; font-size: 12px; color: #4a5568; text-align: center; }
  </style>
</head>
<body>
<div class="inner">
  <div class="badge">✦ AI 여행 플래너</div>
  <h1>여행의 처음부터 끝까지,<br><span>AI와 함께</span></h1>
  <p class="sub">AI가 추천하는 장소 블록을 드래그 앤 드롭으로 조립해 여행 일정을 완성해요.</p>

  <div class="cards" style="justify-content:center">
    <a class="card card-3" href="./schedule/">
      <div class="card-num">Step 03</div>
      <div class="card-icon">🗺️</div>
      <div class="card-title">일정</div>
      <div class="card-desc">AI 추천 블록을 드래그 앤 드롭으로 조립해 하루 일정을 완성해요.</div>
      <div class="card-tags">
        <span class="tag">드래그&드롭</span>
        <span class="tag">AI 추천</span>
        <span class="tag">일정 최적화</span>
      </div>
      <div class="card-arrow">→</div>
    </a>
  </div>

  <footer>일정 계획 기능 사용 가능 · Gemini API Key 설정 시 실제 AI 추천 작동</footer>
</div>
</body>
</html>
